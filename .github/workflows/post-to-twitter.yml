name: Post to Twitter

on:
  # Run daily at 6:30am EST (11:30 UTC)
  # Posts go live at 6am EST via ISR, tweets sent 30 min later
  schedule:
    - cron: '30 11 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Leave blank to use today (UTC). Pass a date with no scheduled posts to safely smoke-test the workflow."
        required: false
        type: string
      dry_run:
        description: "Print the tweet without posting (no API call, no charge)."
        required: false
        type: boolean
        default: false

jobs:
  post-twitter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        # setup-uv switched to immutable releases at v8; no floating @v8 tag.
        # Pin to a specific version and update intentionally.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_KEY_SECRET: ${{ secrets.TWITTER_API_KEY_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          uv run tools/post_to_twitter.py $ARGS
