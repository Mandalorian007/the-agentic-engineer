version = 1
revision = 3
requires-python = ">=3.10"

[[package]]
name = "agentic-engineer-blog"
version = "2.0.0"
source = { editable = "." }
dependencies = [
    { name = "openai" },
    { name = "pillow" },
    { name = "python-dotenv" },
    { name = "pyyaml" },
    { name = "requests" },
    { name = "tweepy" },
]

[package.metadata]
requires-dist = [
    { name = "openai", specifier = ">=1.0.0" },
    { name = "pillow", specifier = ">=11.0.0" },
    { name = "python-dotenv", specifier = ">=1.0.1" },
    { name = "pyyaml", specifier = ">=6.0.2" },
    { name = "requests", specifier = ">=2.31.0" },
    { name = "tweepy", specifier = ">=4.14.0" },
]
